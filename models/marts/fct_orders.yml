version: 2

models:
  - name: fct_orders
    description: >
      One row per order. Contains revenue metrics, payment status, and
      customer context. Incremental load — merges on order_id.
      Recognized revenue = 0 for non-completed or unpaid orders.

    columns:
      - name: order_sk
        description: "Surrogate key generated by dbt_utils"
        tests: [not_null, unique]

      - name: order_id
        tests: [not_null, unique]

      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id

      - name: order_status
        tests:
          - accepted_values:
              values: ['completed','shipped','processing','returned','cancelled']

      - name: order_gross_amount
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0

      - name: final_order_amount
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0

      - name: recognized_revenue
        description: "Revenue recognized only on completed and paid orders"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0

      - name: customer_tier
        tests:
          - accepted_values:
              values: ['GOLD', 'SILVER', 'BRONZE']
              config:
                severity: warn   # warn only — customer may have been deleted

  - name: dim_customers
    description: >
      Customer dimension enriched with lifetime order statistics and LTV
      segmentation. Full refresh on each run.

    columns:
      - name: customer_sk
        tests: [not_null, unique]

      - name: customer_id
        tests: [not_null, unique]

      - name: email
        tests: [not_null, unique]

      - name: ltv_segment
        tests:
          - not_null
          - accepted_values:
              values: ['CHAMPION','LOYAL','POTENTIAL','NEW','PROSPECT']

      - name: return_rate_pct
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100

      - name: lifetime_value
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0

      - name: total_orders
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
